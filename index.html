<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0b1120">
    <title>ZenFinance Pro - Exclusive</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.4s ease, color 0.4s ease; padding-bottom: 110px; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        /* Palet Latar Belakang AMOLED */
        body { background-color: #f8fafc; color: #1e293b; }
        .dark { background-color: #0b1120; color: #f8fafc; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Glassmorphism */
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); }
        .dark .glass { background: rgba(11, 17, 32, 0.8); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        
        .chart-container { position: relative; height: 260px; width: 100%; }
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
        input[type=datetime-local]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; }
        .dark input[type=datetime-local]::-webkit-calendar-picker-indicator { filter: invert(1); }
        
        /* Toast Notification */
        #toast { visibility: hidden; min-width: 240px; background-color: #1e293b; color: #fff; text-align: center; border-radius: 20px; padding: 14px 24px; position: fixed; z-index: 100; left: 50%; bottom: 110px; transform: translateX(-50%) scale(0.9); font-size: 13px; font-weight: 700; opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2); }
        #toast.show { visibility: visible; opacity: 1; bottom: 120px; transform: translateX(-50%) scale(1); }
        .dark #toast { background-color: #f1f5f9; color: #0f172a; }

        /* Gradasi Kartu Premium */
        .card-cash { background: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%); color: #334155; }
        .dark .card-cash { background: linear-gradient(135deg, #334155 0%, #1e293b 100%); color: #f1f5f9; }
        .card-ewallet { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); color: #ffffff; }
        .dark .card-ewallet { background: linear-gradient(135deg, #4338ca 0%, #312e81 100%); color: #ffffff; }
        
        /* Navigasi Island Style */
        .nav-island { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 400px; height: 74px; border-radius: 30px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); border: 1px solid rgba(255, 255, 255, 0.1); }
        .dark .nav-island { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); }

        /* Hilangkan Scrollbar khusus untuk kontainer mingguan agar rapi */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5839/5839888.png">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/5839/5839888.png">
</head>
<body id="body">

    <header class="p-5 glass sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-extrabold bg-gradient-to-r from-indigo-600 to-blue-500 dark:from-indigo-400 dark:to-blue-300 bg-clip-text text-transparent">ZenFinance</h1>
            <p class="text-[9px] font-bold text-slate-500 dark:text-slate-400 tracking-[0.3em] uppercase">Executive Pro</p>
        </div>
        <div class="flex gap-2.5">
            <button onclick="downloadBackup()" title="Backup" class="w-10 h-10 flex items-center justify-center rounded-full bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700 active:scale-90 transition-transform">💾</button>
            <label class="w-10 h-10 flex items-center justify-center rounded-full bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700 cursor-pointer active:scale-90 transition-transform">
                📂 <input type="file" class="hidden" accept=".json" onchange="restoreBackup(event)">
            </label>
            <button onclick="toggleNightMode()" class="w-10 h-10 flex items-center justify-center rounded-full bg-indigo-50 dark:bg-slate-800 border border-indigo-100 dark:border-slate-700 text-indigo-600 dark:text-yellow-400 active:rotate-12 transition-all">
                <span id="modeIcon">🌙</span>
            </button>
        </div>
    </header>

    <main class="p-5 max-w-md mx-auto">

        <div id="tab-dashboard" class="tab-content active fade-in">
            <div class="bg-gradient-to-br from-slate-800 to-slate-900 dark:from-slate-800 dark:to-black p-6 rounded-[2rem] shadow-xl shadow-slate-300/50 dark:shadow-none mb-4 text-white relative overflow-hidden border border-slate-700/50">
                <div class="absolute -right-10 -top-10 w-40 h-40 bg-indigo-500/20 rounded-full blur-3xl"></div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-1.5 relative z-10">Total Saldo Aktif</p>
                <h2 class="text-3xl font-extrabold truncate tracking-tight relative z-10" id="totalAllBalance">Rp 0</h2>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="card-cash p-5 rounded-[1.5rem] shadow-sm border border-slate-200/50 dark:border-slate-600/20 relative overflow-hidden">
                    <p class="text-[9px] font-extrabold opacity-70 uppercase tracking-widest mb-1.5">💵 Tunai</p>
                    <h2 class="text-base font-bold truncate" id="cashBalance">Rp 0</h2>
                </div>
                <div class="card-ewallet p-5 rounded-[1.5rem] shadow-lg border border-indigo-500/20 relative overflow-hidden">
                    <p class="text-[9px] font-extrabold opacity-80 uppercase tracking-widest mb-1.5">📱 Digital</p>
                    <h2 class="text-base font-bold truncate" id="walletBalance">Rp 0</h2>
                </div>
            </div>

            <div class="bg-white dark:bg-slate-800/80 p-6 rounded-[2.5rem] shadow-2xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-slate-700/50 mb-8 backdrop-blur-md">
                <p class="text-center text-[10px] font-black text-slate-300 dark:text-slate-500 uppercase tracking-[0.3em] mb-4" id="formTitle">Input Transaksi</p>
                
                <div class="flex gap-2 mb-6 bg-slate-50 dark:bg-slate-900/60 p-1.5 rounded-[1.2rem]">
                    <button id="btnTypeExpense" onclick="setTrxType('expense')" class="flex-1 py-2 rounded-xl text-[11px] uppercase tracking-wider font-extrabold bg-white dark:bg-slate-700 shadow-sm text-rose-500 transition-all">Keluar</button>
                    <button id="btnTypeIncome" onclick="setTrxType('income')" class="flex-1 py-2 rounded-xl text-[11px] uppercase tracking-wider font-extrabold text-slate-400 dark:text-slate-500 hover:text-emerald-500 transition-all">Masuk</button>
                </div>

                <input type="text" inputmode="numeric" id="amount" placeholder="0" oninput="formatRupiah(this)" class="w-full bg-transparent text-5xl font-extrabold text-center mb-6 outline-none dark:text-white placeholder-slate-200 dark:placeholder-slate-700 tracking-tighter transition-all">
                
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <input type="datetime-local" id="trxDate" class="p-4 bg-slate-50 dark:bg-slate-900/60 rounded-2xl border-none text-[11px] font-bold outline-none cursor-pointer text-slate-600 dark:text-slate-300 w-full">
                    <select id="walletType" class="p-4 bg-slate-50 dark:bg-slate-900/60 rounded-2xl border-none text-[11px] font-bold outline-none cursor-pointer text-slate-600 dark:text-slate-300 w-full">
                        <option value="cash">Dari: Cash</option>
                        <option value="ewallet">Dari: E-Wallet</option>
                    </select>
                </div>

                <div class="flex gap-2 mb-6">
                    <select id="categorySelect" class="flex-grow p-4 bg-slate-50 dark:bg-slate-900/60 rounded-2xl border-none text-[11px] font-bold outline-none truncate cursor-pointer text-slate-600 dark:text-slate-300"></select>
                    <button onclick="addCategoryPrompt()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 rounded-2xl font-bold active:scale-90 transition-all shadow-lg shadow-indigo-500/30">+</button>
                    <button onclick="deleteCategoryPrompt()" class="bg-rose-500 hover:bg-rose-600 text-white px-4 rounded-2xl font-bold active:scale-90 transition-all shadow-lg shadow-rose-500/30">-</button>
                </div>

                <div class="flex gap-2">
                    <button id="btnCancelEdit" onclick="cancelEdit()" class="hidden flex-1 bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300 py-[18px] rounded-[1.5rem] text-[13px] font-black active:scale-95 transition-all">BATAL</button>
                    <button id="btnSaveTrx" onclick="saveTrx()" class="flex-[2] bg-indigo-500 hover:bg-indigo-600 text-white py-[18px] rounded-[1.5rem] text-[13px] font-black shadow-xl shadow-indigo-500/30 active:scale-95 transition-all">SIMPAN</button>
                </div>
            </div>

            <div class="flex justify-between items-center mb-5 px-3">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Riwayat Terbaru</h3>
                <select onchange="render()" id="filterWallet" class="bg-transparent text-[10px] font-black text-indigo-500 border-none outline-none cursor-pointer uppercase">
                    <option value="all">Semua Dompet</option>
                    <option value="cash">Hanya Cash</option>
                    <option value="ewallet">Hanya E-Wallet</option>
                </select>
            </div>
            <div id="mainList" class="space-y-4"></div>
        </div>

        <div id="tab-report" class="tab-content fade-in">
            <div class="flex justify-between items-center mb-6 px-2">
                <h3 class="font-extrabold text-2xl text-slate-800 dark:text-white tracking-tight">Laporan</h3>
                <button onclick="exportToPDF()" class="bg-rose-50 hover:bg-rose-100 dark:bg-rose-500/10 dark:hover:bg-rose-500/20 text-rose-600 dark:text-rose-400 px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest border border-rose-100 dark:border-rose-500/20 active:scale-90 transition-all">📄 PDF</button>
            </div>
            
            <div class="flex justify-between items-center mb-8 px-2">
                <div class="flex items-center gap-1.5 bg-white dark:bg-slate-800 p-2 rounded-full shadow-sm border border-slate-100 dark:border-slate-700 w-full justify-between">
                    <button onclick="changeMonth(-1)" class="w-9 h-9 flex items-center justify-center text-slate-400 hover:text-indigo-600 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-full active:scale-90 transition-all"> &lt; </button>
                    <span id="currentViewDate" class="text-[11px] font-black uppercase text-center text-slate-700 dark:text-slate-200">Mei 2026</span>
                    <button onclick="changeMonth(1)" class="w-9 h-9 flex items-center justify-center text-slate-400 hover:text-indigo-600 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-full active:scale-90 transition-all"> &gt; </button>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-white dark:bg-slate-800 p-5 rounded-[1.5rem] border border-slate-50 dark:border-slate-700 shadow-sm">
                    <div class="w-8 h-8 bg-emerald-50 dark:bg-emerald-500/10 rounded-xl flex items-center justify-center text-emerald-500 mb-3 font-bold text-lg">↙</div>
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Masuk</p>
                    <p class="text-sm font-bold text-emerald-600 dark:text-emerald-400 truncate" id="statIncome">Rp 0</p>
                </div>
                <div class="bg-white dark:bg-slate-800 p-5 rounded-[1.5rem] border border-slate-50 dark:border-slate-700 shadow-sm">
                    <div class="w-8 h-8 bg-rose-50 dark:bg-rose-500/10 rounded-xl flex items-center justify-center text-rose-500 mb-3 font-bold text-lg">↗</div>
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Keluar</p>
                    <p class="text-sm font-bold text-rose-600 dark:text-rose-400 truncate" id="statExpense">Rp 0</p>
                </div>
            </div>

            <div class="bg-white dark:bg-slate-800 p-8 rounded-[2.5rem] border border-slate-50 dark:border-slate-700 mb-8 shadow-sm">
                <div class="flex gap-2 mb-6 bg-slate-50 dark:bg-slate-900/60 p-1.5 rounded-[1.2rem]">
                    <button id="btnReportExpense" onclick="setReportType('expense')" class="flex-1 py-2 rounded-xl text-[11px] uppercase tracking-wider font-extrabold bg-white dark:bg-slate-700 shadow-sm text-rose-500 transition-all">Pengeluaran</button>
                    <button id="btnReportIncome" onclick="setReportType('income')" class="flex-1 py-2 rounded-xl text-[11px] uppercase tracking-wider font-extrabold text-slate-400 dark:text-slate-500 hover:text-emerald-500 transition-all">Pemasukan</button>
                </div>
                <div class="chart-container">
                    <canvas id="expenseChart"></canvas>
                </div>
                <div id="noDataInfo" class="hidden text-center py-12 text-slate-400 text-xs font-semibold italic">Belum ada pengeluaran bulan ini.</div>
            </div>

            <div id="weeklySection" class="bg-white dark:bg-slate-800 p-5 rounded-[2.5rem] border border-slate-50 dark:border-slate-700 mb-8 shadow-sm hidden">
                <p class="text-center text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-[0.3em] mb-4">Aktivitas Mingguan</p>
                <div id="weeklyChartsContainer" class="flex justify-between items-end overflow-x-auto hide-scrollbar gap-2 px-1">
                    </div>
            </div>

            <div id="categoryBreakdown" class="space-y-3.5 pb-6"></div>
        </div>

        <div id="tab-others" class="tab-content fade-in">
            <h3 class="font-extrabold text-2xl mb-8 text-slate-800 dark:text-white tracking-tight px-2">Ekstra</h3>
            
            <div class="mb-10">
                <p class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase mb-4 tracking-[0.3em] pl-3">Mutasi Dana</p>
                <div class="bg-white dark:bg-slate-800 p-6 rounded-[2.5rem] border border-slate-100 dark:border-slate-700 shadow-sm">
                    <div class="flex items-center gap-3 mb-5">
                        <select id="fromWallet" class="flex-1 p-4 bg-slate-50 dark:bg-slate-900/60 rounded-2xl border-none text-[11px] font-bold text-slate-600 dark:text-slate-300">
                            <option value="cash">Dari Cash</option>
                            <option value="ewallet">Dari E-Wallet</option>
                        </select>
                        <span class="text-slate-300 dark:text-slate-600">➜</span>
                        <select id="toWallet" class="flex-1 p-4 bg-slate-50 dark:bg-slate-900/60 rounded-2xl border-none text-[11px] font-bold text-slate-600 dark:text-slate-300">
                            <option value="ewallet">Ke E-Wallet</option>
                            <option value="cash">Ke Cash</option>
                        </select>
                    </div>
                    <input type="text" inputmode="numeric" id="transferAmount" placeholder="Nominal Transfer Rp" oninput="formatRupiah(this)" class="w-full p-4 mb-5 bg-slate-50 dark:bg-slate-900/60 rounded-2xl border-none text-xl font-black text-center outline-none text-slate-800 dark:text-white">
                    <button onclick="processTransfer()" class="w-full bg-slate-900 dark:bg-indigo-600 text-white py-[18px] rounded-[1.5rem] text-[13px] font-black active:scale-95 transition-all shadow-lg">PINDAHKAN SALDO</button>
                </div>
            </div>
            
            <div>
                <p class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase mb-4 tracking-[0.3em] pl-3">Hutang & Piutang</p>
                <div class="bg-white dark:bg-slate-800 p-6 rounded-[2.5rem] border border-slate-100 dark:border-slate-700 shadow-sm mb-4">
                    <div class="grid grid-cols-2 gap-3 mb-5">
                        <input type="text" id="personName" placeholder="Nama Orang" class="p-4 bg-slate-50 dark:bg-slate-900/60 rounded-2xl border-none text-[11px] font-bold text-slate-800 dark:text-white placeholder-slate-400">
                        <input type="text" inputmode="numeric" id="debtAmount" placeholder="Rp" oninput="formatRupiah(this)" class="p-4 bg-slate-50 dark:bg-slate-900/60 rounded-2xl border-none text-[11px] font-bold text-slate-800 dark:text-white placeholder-slate-400">
                    </div>
                    <div class="flex gap-4">
                        <button onclick="addDebt('hutang')" class="flex-1 bg-rose-50 dark:bg-rose-500/10 text-rose-600 dark:text-rose-400 py-4 rounded-2xl text-[10px] font-black uppercase active:scale-95 transition-all">Saya Pinjam</button>
                        <button onclick="addDebt('piutang')" class="flex-1 bg-indigo-50 dark:bg-indigo-500/10 text-indigo-600 dark:text-indigo-400 py-4 rounded-2xl text-[10px] font-black uppercase active:scale-95 transition-all">Dia Pinjam</button>
                    </div>
                </div>
                
                <div id="debtList" class="space-y-4"></div>
            </div>
        </div>

    </main>

    <nav class="nav-island glass flex justify-around items-center px-4 z-50">
        <button onclick="showTab('dashboard')" id="nav-dashboard" class="flex flex-col items-center gap-1.5 transition-all duration-300">
            <span class="text-[24px]">💳</span><span class="text-[8px] font-black uppercase tracking-widest text-slate-600 dark:text-slate-400">Beranda</span>
        </button>
        <button onclick="showTab('report')" id="nav-report" class="flex flex-col items-center gap-1.5 opacity-40 grayscale transition-all duration-300">
            <span class="text-[24px]">📊</span><span class="text-[8px] font-black uppercase tracking-widest text-slate-600 dark:text-slate-400">Analisa</span>
        </button>
        <button onclick="showTab('others')" id="nav-others" class="flex flex-col items-center gap-1.5 opacity-40 grayscale transition-all duration-300">
            <span class="text-[24px]">⚙️</span><span class="text-[8px] font-black uppercase tracking-widest text-slate-600 dark:text-slate-400">Fitur</span>
        </button>
        <button onclick="clearAll()" class="flex flex-col items-center gap-1.5 opacity-40 transition-all duration-300">
            <span class="text-[24px]">🗑️</span><span class="text-[8px] font-black uppercase tracking-widest text-rose-500">Reset</span>
        </button>
    </nav>

    <div id="toast">Tersimpan!</div>

    <script>
        const defaultData = { 
            transactions: [], 
            debts: [], 
            categories: {
                income: ["Gaji", "Bonus", "Investasi", "Pemberian", "Lainnya"],
                expense: ["Makan & Minum", "Transportasi", "Belanja", "Tagihan", "Hobi", "Edukasi", "Lainnya"]
            }
        };
        
        let savedData = JSON.parse(localStorage.getItem('zenFinanceVFinal'));
        let data = savedData ? { ...defaultData, ...savedData } : defaultData;

        if (Array.isArray(data.categories)) {
            data.categories = {
                income: [...defaultData.categories.income],
                expense: [...data.categories] 
            };
            saveData();
        }

        let isDark = localStorage.getItem('zenDark') === 'true';
        let myChart = null;
        let weeklyCharts = []; 
        let chartRenderTimeout; // PERBAIKAN: Timeout global untuk render chart

        let viewDate = new Date();
        let currentTrxType = 'expense';
        let editTrxId = null;
        let currentReportType = 'expense';

        const chartColors = [
            '#6366f1', '#0ea5e9', '#10b981', '#f59e0b', '#f43f5e', 
            '#8b5cf6', '#14b8a6', '#f97316', '#475569', '#ec4899', 
            '#84cc16', '#06b6d4', '#eab308', '#d946ef', '#64748b', 
            '#f472b6', '#38bdf8', '#34d399', '#fbbf24', '#fb7185'
        ];

        function init() {
            if (isDark) {
                document.getElementById('body').classList.add('dark');
                document.getElementById('modeIcon').innerText = "☀️";
            }
            document.getElementById('trxDate').value = getLocalIsoString(Date.now());
            setTrxType('expense');
            showTab('dashboard');
            render();
            checkBackupReminder();
        }

        function getLocalIsoString(d) {
            const date = new Date(d);
            const pad = (n) => n.toString().padStart(2, '0');
            return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
        }

        function showToast(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg;
            t.className = "show";
            setTimeout(() => { t.className = ""; }, 2500);
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }

        function formatCatName(n) {
            return n.trim().toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
        }

        function setTrxType(type) {
            currentTrxType = type;
            const btnExp = document.getElementById('btnTypeExpense');
            const btnInc = document.getElementById('btnTypeIncome');
            
            if(type === 'expense') {
                btnExp.className = "flex-1 py-2 rounded-xl text-[11px] uppercase tracking-wider font-extrabold bg-white dark:bg-slate-700 shadow-sm text-rose-500 transition-all";
                btnInc.className = "flex-1 py-2 rounded-xl text-[11px] uppercase tracking-wider font-extrabold text-slate-400 dark:text-slate-500 hover:text-emerald-500 transition-all";
            } else {
                btnInc.className = "flex-1 py-2 rounded-xl text-[11px] uppercase tracking-wider font-extrabold bg-white dark:bg-slate-700 shadow-sm text-emerald-500 transition-all";
                btnExp.className = "flex-1 py-2 rounded-xl text-[11px] uppercase tracking-wider font-extrabold text-slate-400 dark:text-slate-500 hover:text-rose-500 transition-all";
            }
            updateCategoryList();
        }

        function setReportType(type) {
            currentReportType = type;
            const btnExp = document.getElementById('btnReportExpense');
            const btnInc = document.getElementById('btnReportIncome');
            
            if(type === 'expense') {
                btnExp.className = "flex-1 py-2 rounded-xl text-[11px] uppercase tracking-wider font-extrabold bg-white dark:bg-slate-700 shadow-sm text-rose-500 transition-all";
                btnInc.className = "flex-1 py-2 rounded-xl text-[11px] uppercase tracking-wider font-extrabold text-slate-400 dark:text-slate-500 hover:text-emerald-500 transition-all";
            } else {

        function formatRupiah(input) {
            const oldValue = input.value;
            const oldCursor = input.selectionStart;
            const digitsBeforeCursor = oldValue.slice(0, oldCursor).replace(/\D/g, '').length;
            const numbers = oldValue.replace(/\D/g, '');
            const formatted = numbers ? parseInt(numbers, 10).toLocaleString('id-ID') : '';
            input.value = formatted;
            let newCursor = 0, digitCount = 0;
            while (newCursor < formatted.length) {
                if (/\d/.test(formatted[newCursor])) digitCount++;
                if (digitCount >= digitsBeforeCursor) { newCursor++; break; }
                newCursor++;
            }
            setTimeout(() => { input.setSelectionRange(newCursor, newCursor); }, 0);
        }

        function processTransfer() {
            const amt = parseInt(document.getElementById('transferAmount').value.replace(/\./g, ''));
            const f = document.getElementById('fromWallet').value;
            const t = document.getElementById('toWallet').value;
            
            if (!amt || amt <= 0 || f === t) { showToast("Input mutasi tidak valid"); return; }
            const sourceBalance = data.transactions.reduce((acc, curr) => {
                if (curr.wal === f) return acc + (curr.type === 'income' ? curr.amt : -curr.amt); return acc;
            }, 0);

            if (amt > sourceBalance) { showToast(`Gagal! Saldo tidak cukup.`); return; }

            const now = Date.now();
            data.transactions.push({ id: now + Math.random(), amt, type: 'expense', wal: f, cat: 'Mutasi Keluar', date: now });
            data.transactions.push({ id: now + Math.random(), amt, type: 'income', wal: t, cat: 'Mutasi Masuk', date: now });
            
            document.getElementById('transferAmount').value = ''; showTab('dashboard'); saveData(); render(); showToast("Selesai Mutasi");

                        animation: { animateScale: true }

        function exportToPDF() {
            try {
                showToast("Menyiapkan PDF...");
                const { jsPDF } = window.jspdf; const doc = new jsPDF();
                const tm = viewDate.getMonth(), ty = viewDate.getFullYear();
                const bulanNames = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
                
                doc.setFontSize(18); doc.setTextColor(30, 41, 59); doc.text(`Laporan Keuangan ZenFinance`, 14, 20);
                doc.setFontSize(11); doc.setTextColor(100, 116, 139); doc.text(`Periode: ${bulanNames[tm]} ${ty}`, 14, 28);

                let totalIn = 0, totalOut = 0; let weeks = { 1: { in: 0, out: 0 }, 2: { in: 0, out: 0 }, 3: { in: 0, out: 0 }, 4: { in: 0, out: 0 }, 5: { in: 0, out: 0 } };
                const rowsDetail = [];

                data.transactions.forEach(t => {
                    // PERBAIKAN: Abaikan Mutasi untuk PDF
                    if(t.cat === 'Mutasi Masuk' || t.cat === 'Mutasi Keluar') return; 

                    const d = new Date(t.date);
                    if(d.getMonth() === tm && d.getFullYear() === ty) {
                        if(t.type === 'income') totalIn += t.amt; else totalOut += t.amt;
                        let weekNum = Math.ceil(d.getDate() / 7); if(weekNum > 5) weekNum = 5;
                        if(t.type === 'income') weeks[weekNum].in += t.amt; else weeks[weekNum].out += t.amt;
                        const timeStr = d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
                        rowsDetail.push([ `${d.toLocaleDateString('id-ID')} ${timeStr}`, t.cat, t.wal.toUpperCase(), t.type === 'income' ? 'MASUK' : 'KELUAR', `Rp ${t.amt.toLocaleString('id-ID')}` ]);
                    }
                });

                if(rowsDetail.length === 0) { showToast("Tidak ada transaksi bulan ini."); return; }

                doc.autoTable({ head: [['Ringkasan Bulanan', 'Nominal']], body: [ ['Total Pemasukan', `Rp ${totalIn.toLocaleString('id-ID')}`], ['Total Pengeluaran', `Rp ${totalOut.toLocaleString('id-ID')}`], ['Selisih (Saldo Bersih)', `Rp ${(totalIn - totalOut).toLocaleString('id-ID')}`] ], startY: 35, theme: 'grid', headStyles: { fillColor: [30, 41, 59] }, styles: { font: 'helvetica', fontSize: 10 } });

                const weeklyBody = [];
                for(let i=1; i<=5; i++) { if(weeks[i].in > 0 || weeks[i].out > 0) { weeklyBody.push([`Minggu ke-${i}`, `Rp ${weeks[i].in.toLocaleString('id-ID')}`, `Rp ${weeks[i].out.toLocaleString('id-ID')}`]); } }

                if(weeklyBody.length > 0) { doc.autoTable({ head: [['Periode', 'Pemasukan', 'Pengeluaran']], body: weeklyBody, startY: doc.lastAutoTable.finalY + 10, theme: 'grid', headStyles: { fillColor: [99, 102, 241] }, styles: { font: 'helvetica', fontSize: 10 } }); }

                doc.autoTable({ head: [['Waktu', 'Kategori', 'Dompet', 'Jenis', 'Nominal']], body: rowsDetail, startY: doc.lastAutoTable.finalY + 10, theme: 'grid', headStyles: { fillColor: [15, 23, 42] }, styles: { font: 'helvetica', fontSize: 9 } });

                doc.save(`Laporan_ZenFinance_${bulanNames[tm]}_${ty}.pdf`); showToast("PDF Berhasil Diunduh!");
            } catch(e) { showToast("Gagal! Pastikan internet menyala untuk load PDF."); console.error(e); }
        }

        }

        function restoreBackup(e) {
            if(!e.target.files[0]) return; const r = new FileReader();
            r.onload = (evt) => { try { data = JSON.parse(evt.target.result); if (Array.isArray(data.categories)) { data.categories = { income: [...defaultData.categories.income], expense: [...data.categories] }; } saveData(); updateCategoryList(); render(); showTab('dashboard'); showToast("Pemulihan Berhasil!"); } catch(err) { showToast("File tidak dikenal"); } };
            r.readAsText(e.target.files[0]);
        }

        function clearAll() { 
            if(confirm("PERINGATAN: Hapus semua data secara permanen?")) { data = { transactions: [], debts: [], categories: { income: ["Gaji", "Bonus", "Lainnya"], expense: ["Makan", "Transport", "Lainnya"] } }; saveData(); updateCategoryList(); render(); showToast("Sistem Bersih"); } 
        }

        function checkBackupReminder() {
            const lastBackup = localStorage.getItem('zenLastBackup'); const now = Date.now(); const thirtyDays = 30 * 24 * 60 * 60 * 1000;
            if (!lastBackup || (now - parseInt(lastBackup)) > thirtyDays) { setTimeout(() => { alert("Halo! 🛡️\n\nSepertinya kamu belum mem-backup data keuanganmu bulan ini. Yuk, unduh backup sekarang agar data kerjamu aman!"); }, 1500); }
        }
        
        init();
    </script>
</body>
</html>
